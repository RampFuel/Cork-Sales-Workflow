<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cork Cyber — Decision Tree Web App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --corange: #FF6737;
  --corange-dark: #E04A1F;
  --corange-light: #FCE8E2;
  --coal: #292527;
  --cream: #FAF7EF;
  --ivory: #FFFEF9;
  --teal: #228472;
  --teal-light: #E0F1EF;
  --blue: #75A0FF;
  --blue-light: #E7F1FF;
  --purple: #5220FF;
  --purple-light: #EFE6FF;
  --text: #292527;
  --text-muted: #7a7478;
  --bg: #FFFEF9;
  --bg2: #FAF7EF;
  --border: rgba(41,37,39,0.13);
  --border-strong: rgba(41,37,39,0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --font-head: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --text: #F0EDE6;
    --text-muted: #9a9490;
    --bg: #1e1b19;
    --bg2: #252220;
    --border: rgba(250,247,239,0.1);
    --border-strong: rgba(250,247,239,0.28);
    --corange-light: #3a1a0e;
    --teal-light: #0a2420;
    --blue-light: #0d1a35;
    --purple-light: #150c30;
    --cream: #1e1b19;
  }
}
body {
  font-family: var(--font-body);
  background: var(--cream);
  min-height: 100vh;
  padding: 28px 16px 60px;
  color: var(--text);
}
.wrapper { max-width: 740px; margin: 0 auto; }

.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
.cork-wordmark { font-family: var(--font-head); font-weight: 700; font-size: 20px; color: var(--corange); letter-spacing: -0.3px; margin-bottom: 4px; }
.cork-wordmark span { color: var(--text); }
.header-sub { font-size: 12px; color: var(--text-muted); }
.badge { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--coal); color: #FAF7EF; padding: 5px 13px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
@media (prefers-color-scheme: dark) { .badge { background: var(--corange); color: #fff; } }

#progress-bar { display: flex; align-items: center; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; gap: 0; }
#progress-bar::-webkit-scrollbar { display: none; }
.stage-pill { display: flex; align-items: center; flex-shrink: 0; }
.pill-label { font-family: var(--font-body); font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; background: var(--bg2); color: var(--text-muted); border: 1px solid var(--border); white-space: nowrap; transition: all 0.2s; }
.pill-label.active { background: var(--corange); color: #fff; border-color: var(--corange); font-weight: 700; }
.pill-label.done { background: var(--teal-light); color: var(--teal); border-color: #84C8BD; }
.pill-sep { width: 18px; height: 1.5px; background: var(--border); flex-shrink: 0; }

#card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; min-height: 280px; }

.stage-tag { display: inline-block; font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
.tag-pre { background: var(--corange-light); color: var(--corange-dark); }
.tag-r   { background: var(--blue-light); color: #1a3d8f; }
.tag-a   { background: #FFF8E2; color: #7a4f00; }
.tag-m   { background: var(--teal-light); color: var(--teal); }
.tag-p   { background: var(--corange-light); color: var(--corange-dark); }
.tag-obj { background: var(--purple-light); color: var(--purple); }

#card h2 { font-family: var(--font-head); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.25; }
#card .subtext { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6; }

.q-table { width: 100%; border-collapse: collapse; margin-bottom: 1.25rem; font-size: 13px; }
.q-table th { text-align: left; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 0 10px 8px 0; border-bottom: 2px solid var(--corange); }
.q-table td { padding: 10px 10px 10px 0; vertical-align: top; border-bottom: 1px solid var(--border); line-height: 1.5; color: var(--text); }
.q-table td:first-child { width: 44%; color: var(--text-muted); }
.q-table tr:last-child td { border-bottom: none; }

/* CHECKBOX TABLE */
.check-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 13px; }
.check-table th { text-align: left; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 0 10px 8px 0; border-bottom: 2px solid var(--corange); }
.check-table th:first-child { width: 34px; }
.check-table td { padding: 10px 10px 10px 0; vertical-align: middle; border-bottom: 1px solid var(--border); line-height: 1.5; color: var(--text); transition: opacity 0.25s, color 0.25s; }
.check-table td:first-child { width: 34px; padding-right: 6px; }
.check-table tr:last-child td { border-bottom: none; }
.check-table tr.row-done td { opacity: 0.45; }
.check-table tr.row-done .item-text { text-decoration: line-through; }
.cork-check { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 2px solid var(--border-strong); border-radius: 5px; cursor: pointer; position: relative; display: block; background: var(--bg); transition: all 0.15s; flex-shrink: 0; }
.cork-check:hover:not(:checked) { border-color: var(--corange); }
.cork-check:checked { background: var(--corange); border-color: var(--corange); }
.cork-check:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 6px; height: 10px; border: 2.5px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }

.check-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; font-size: 12px; color: var(--text-muted); }
.check-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.check-bar-fill { height: 100%; background: var(--corange); border-radius: 3px; transition: width 0.3s ease; }
.check-stat { white-space: nowrap; font-weight: 700; font-size: 12px; color: var(--text-muted); }
.check-ready { display: none; font-size: 12px; font-weight: 700; color: var(--teal); white-space: nowrap; }
.check-ready.on { display: block; }

.choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn { display: flex; align-items: flex-start; gap: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 15px; cursor: pointer; text-align: left; font-family: var(--font-body); font-size: 13px; color: var(--text); transition: border-color 0.15s, background 0.15s; line-height: 1.45; width: 100%; }
.choice-btn:hover { border-color: var(--corange); background: var(--corange-light); }
.choice-btn .ch-arrow { color: var(--corange); flex-shrink: 0; margin-top: 1px; font-size: 17px; font-weight: 700; line-height: 1; }
.choice-btn .ch-label { font-weight: 700; flex: 1; }
.choice-btn .ch-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.choice-btn .ch-wrap .ch-label { font-weight: 700; }
.choice-btn .ch-wrap .ch-hint { font-size: 12px; color: var(--text-muted); }

.pain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
@media (max-width: 520px) { .pain-grid { grid-template-columns: 1fr; } }
.pain-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--corange); border-radius: var(--radius-sm); padding: 12px 14px; cursor: pointer; text-align: left; font-family: var(--font-body); transition: border-color 0.15s, background 0.15s; width: 100%; }
.pain-card:hover { background: var(--corange-light); border-color: var(--corange); }
.pain-card .pc-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.pain-card .pc-sub { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

.outcome-box { border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 1rem; font-size: 13px; line-height: 1.6; }
.ob-strong { background: var(--teal-light); border-left: 3px solid var(--teal); }
.ob-multi  { background: var(--blue-light); border-left: 3px solid var(--blue); }
.ob-roi    { background: #FFF8E2; border-left: 3px solid #FFCA37; }
.ob-warm   { background: var(--bg2); border-left: 3px solid var(--border-strong); }
.ob-disq   { background: #FCE8E6; border-left: 3px solid #D83300; }
.ob-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; color: var(--text-muted); }
.ob-strong .ob-label { color: var(--teal); }
.ob-multi .ob-label  { color: #1a3d8f; }
.ob-roi .ob-label    { color: #7a4f00; }
.ob-disq .ob-label   { color: #D83300; }
.ob-action { font-weight: 500; font-style: italic; color: var(--text); }

.nav-row { display: flex; gap: 8px; margin-top: 1.5rem; flex-wrap: wrap; }
.nav-btn { font-family: var(--font-body); font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; background: var(--bg2); color: var(--text); transition: all 0.15s; }
.nav-btn:hover { border-color: var(--corange); color: var(--corange); }
.nav-btn.primary { background: var(--corange); color: #fff; border-color: var(--corange); }
.nav-btn.primary:hover { background: var(--corange-dark); border-color: var(--corange-dark); }

.script-box { background: var(--corange-light); border-left: 3px solid var(--corange); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 15px; font-size: 13px; font-style: italic; color: var(--text); margin-bottom: 1rem; line-height: 1.6; }

.icp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
@media (max-width: 520px) { .icp-row { grid-template-columns: 1fr; } }
.icp-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; line-height: 1.5; }
.icp-card .ic-head { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.icp-card .ic-detail { color: var(--text-muted); }
.icp-card.icp1 { border-top: 3px solid var(--corange); }
.icp-card.icp2 { border-top: 3px solid var(--teal); }
.mini-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 10px; margin-bottom: 7px; letter-spacing: 0.05em; text-transform: uppercase; }
.mt-orange { background: var(--corange-light); color: var(--corange-dark); }
.mt-teal   { background: var(--teal-light); color: var(--teal); }

.bant-wrap { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 1.25rem; font-size: 12px; }
.bant-head { display: grid; grid-template-columns: 38px 1fr 1fr; background: var(--bg2); border-bottom: 1px solid var(--border); }
.bant-head-cell { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); padding: 8px 10px; }
.bant-row { display: grid; grid-template-columns: 38px 1fr 1fr; border-bottom: 1px solid var(--border); }
.bant-row:last-child { border-bottom: none; }
.bant-letter { background: var(--corange-light); border-right: 1px solid var(--border); font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--corange-dark); display: flex; align-items: center; justify-content: center; }
.bant-cell { padding: 10px; line-height: 1.45; color: var(--text); }
.bant-cell.muted { color: var(--text-muted); }

.objection-list, .translation-list { display: flex; flex-direction: column; gap: 7px; }
.obj-item, .tr-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.obj-trigger, .tr-trigger { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text); background: none; border: none; width: 100%; font-family: var(--font-body); text-align: left; gap: 8px; }
.obj-trigger:hover, .tr-trigger:hover { color: var(--corange); }
.ot-arrow { color: var(--text-muted); font-size: 11px; transition: transform 0.15s; flex-shrink: 0; }
.obj-trigger.open .ot-arrow, .tr-trigger.open .ot-arrow { transform: rotate(180deg); }
.obj-body, .tr-body { display: none; padding: 11px 15px 14px; font-size: 13px; color: var(--text-muted); line-height: 1.6; border-top: 1px solid var(--border); }
.obj-body.visible, .tr-body.visible { display: block; }
.tr-probe { margin-top: 7px; font-style: italic; font-size: 12px; color: var(--text); }
.info-note { font-size: 12px; color: var(--text-muted); line-height: 1.55; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div>
      <div class="cork-wordmark">CORK <span>Cyber</span></div>
      <div class="header-sub">Decision Tree Web App &nbsp;·&nbsp; RAMP Framework &nbsp;·&nbsp; BANT Methodology &nbsp;·&nbsp; Built by RampFuel &nbsp;·&nbsp; v4</div>
    </div>
    <span class="badge">Sales Playbook</span>
  </div>
  <div id="progress-bar"></div>
  <div id="card"></div>
</div>
<script>
const STAGES = ['Pre-call','R — Rapport','A — Align','M — Map','P — Progress'];
let navHistory = [];
let currentNode = 'pre_start';
const checkState = {};

const CHECKLIST = [
  { id:'c1', item:'MSP type: pure-play, MSSP, hybrid, or vertical-focused?', signal:'Default to hybrid frame; confirm in opening' },
  { id:'c2', item:'Employee count + rough endpoint estimate', signal:'Estimate from LinkedIn; use "under 50" if unclear' },
  { id:'c3', item:'Partners/Integrations page — stack signals visible?', signal:'Ask about stack in opening; do not assume tools' },
  { id:'c4', item:'Ecosystem: Microsoft, Pax8, ConnectWise, NinjaRMM, Datto?', signal:'Check job listings for PSA/RMM mentions' },
  { id:'c5', item:'ScalePad user? Cork integrates — anchor early.', signal:'Skip the anchor; use generic integration intro' },
  { id:'c6', item:'PE-backed or investor-owned? ROI conversation required.', signal:"Don't assume ROI pressure; surface it in BANT" },
  { id:'c7', item:'Inbound trigger: BDR, webinar, insurance question, referral?', signal:'Open with: "What prompted you to book this call?"' }
];
CHECKLIST.forEach(i => { if (!(i.id in checkState)) checkState[i.id] = false; });

function syncChecks() {
  document.querySelectorAll('.cork-check').forEach(cb => {
    const row = cb.closest('tr');
    cb.checked = !!checkState[cb.dataset.cid];
    if (row) row.classList.toggle('row-done', cb.checked);
  });
  refreshProgress();
}
function onCheck(cb) {
  checkState[cb.dataset.cid] = cb.checked;
  const row = cb.closest('tr');
  if (row) row.classList.toggle('row-done', cb.checked);
  refreshProgress();
}
function refreshProgress() {
  const total = CHECKLIST.length;
  const done = CHECKLIST.filter(i => checkState[i.id]).length;
  const pct = Math.round(done / total * 100);
  const fill = document.getElementById('cpfill');
  const stat = document.getElementById('cpstat');
  const ready = document.getElementById('cpready');
  if (fill) fill.style.width = pct + '%';
  if (stat) stat.textContent = done + ' / ' + total;
  if (ready) ready.classList.toggle('on', done === total);
}

const NODES = {
  pre_start: {
    stage:0, tag:'tag-pre', tagLabel:'Pre-call · Research & Qualification',
    title:"Enter informed. Not winging it.",
    sub:"Mandatory rule: if you cannot state two things about this prospect's business without asking, you are not ready for this call.",
    content: () => `
      <div class="check-progress">
        <span class="check-stat" id="cpstat">0 / 7</span>
        <div class="check-bar-wrap"><div class="check-bar-fill" id="cpfill" style="width:0%"></div></div>
        <span class="check-ready" id="cpready">Ready to proceed</span>
      </div>
      <table class="check-table">
        <thead><tr><th></th><th>Research checklist</th><th>If signal is missing</th></tr></thead>
        <tbody>${CHECKLIST.map(i=>`
          <tr>
            <td><input type="checkbox" class="cork-check" data-cid="${i.id}" onchange="onCheck(this)"></td>
            <td class="item-text">${i.item}</td>
            <td>${i.signal}</td>
          </tr>`).join('')}
        </tbody>
      </table>`,
    choices:[{label:'Research done. Decide ICP route.',next:'pre_icp'}],
    afterRender: syncChecks
  },

  pre_icp: {
    stage:0, tag:'tag-pre', tagLabel:'Pre-call · ICP Route',
    title:"Which ICP route before the call?",
    sub:"This sets your confirmation statements, close motion, and cycle expectations.",
    content:()=>`
      <div class="icp-row">
        <div class="icp-card icp1">
          <div class="mini-tag mt-orange">ICP 1 — Strategic (ABM)</div>
          <div class="ic-head">100+ employees · 5,000+ endpoints</div>
          <div class="ic-detail">Mature stack · PE/investor-backed = EBITDA sensitivity · 60–90 day cycle · Multi-thread early · Lead with endpoint reconciliation + ROI</div>
        </div>
        <div class="icp-card icp2">
          <div class="mini-tag mt-teal">ICP 2 — Growth MSP</div>
          <div class="ic-head">15–100 employees · 500–5,000 endpoints</div>
          <div class="ic-detail">Partial stack · Insurance/differentiation driven · 1–2 call close in 30 days · 30-min onboarding · 14-day POC path</div>
        </div>
      </div>`,
    choices:[
      {label:'ICP 1 — Strategic',hint:'60–90 day · Multi-thread · ROI first',next:'pre_confirm_icp1'},
      {label:'ICP 2 — Growth MSP',hint:'30-day close · Direct trial path',next:'pre_confirm_icp2'}
    ]
  },

  pre_confirm_icp1: {
    stage:0, tag:'tag-pre', tagLabel:"Pre-call · ICP 1 Confirmation Statements",
    title:"Say these. Don't ask them cold.",
    sub:'Confirm what you found in research. Land as informed, not scripted.',
    content:()=>`
      <table class="q-table">
        <tr><th>Signal found</th><th>Confirmation statement</th></tr>
        <tr><td>PE-backed / investor-owned</td><td>"For a PE-backed MSP, we typically start by running endpoint reconciliation live — most partners find $3,000–$8,000 in monthly savings in the first session."</td></tr>
        <tr><td>Large stack / tool sprawl</td><td>"You've got Huntress, ConnectWise, NinjaRMM, Duo — great stack. The question is whether those tools are actually validating each other, or just running in parallel."</td></tr>
        <tr><td>Recent acquisition</td><td>"It looks like you've recently made an acquisition — MSP integrations typically take 18 months without full stack visibility. Cork compresses that."</td></tr>
      </table>`,
    choices:[{label:'Ready to dial. Open the call.',next:'r_open'}]
  },

  pre_confirm_icp2: {
    stage:0, tag:'tag-pre', tagLabel:"Pre-call · ICP 2 Confirmation Statements",
    title:"Say these. Don't ask them cold.",
    sub:'Pick the statement that matches your research signal.',
    content:()=>`
      <table class="q-table">
        <tr><th>Signal found</th><th>Confirmation statement</th></tr>
        <tr><td>Cyber insurance focus / inbound</td><td>"You reached out about cyber insurance — most MSPs aren't worried about getting a policy, they're worried about a claim getting denied."</td></tr>
        <tr><td>ScalePad user</td><td>"We integrate with ScalePad directly. Your QBR data and compliance summaries will already be in a structured format before we connect anything."</td></tr>
        <tr><td>Huntress / NinjaRMM visible</td><td>"We pull from NinjaRMM and Huntress via API — no agent — and cross-reference your EDR, MFA, and backup to show exactly where the gaps are."</td></tr>
      </table>`,
    choices:[{label:'Ready to dial. Open the call.',next:'r_open'}]
  },

  r_open: {
    stage:1, tag:'tag-r', tagLabel:'R — Rapport & Runway · 0–5 min',
    title:"Open the call. Earn the right to go deep.",
    sub:"Goal: build trust, set expectations, earn permission to ask questions. Signal this won't be a pitch.",
    content:()=>`
      <div class="script-box">"Quick intros — then before I jump into anything, I want to make sure I actually understand what's going on for you right now, and only show you the parts of Cork that are relevant to your business."</div>
      <table class="q-table">
        <tr><th>Move</th><th>Why it works</th></tr>
        <tr><td>"I saw you're using [tool] — is that still your primary RMM?"</td><td>Shows preparation. Anchors to their stack immediately.</td></tr>
        <tr><td>"Do you have a hard stop at [time]?"</td><td>Surfaces commitment. Reveals if they're half-in.</td></tr>
        <tr><td>"Before the demo, I want to ask a few questions so I'm not showing you things that don't apply. Is that okay?"</td><td>Explicit permission to qualify. Positions as homework, not interrogation.</td></tr>
        <tr><td>"You reached out — what prompted you to book this demo?"</td><td>For inbound: surfaces the real reason fast.</td></tr>
      </table>`,
    choices:[{label:'Permission earned. Start discovery.',next:'a_path'}]
  },

  a_path: {
    stage:2, tag:'tag-a', tagLabel:'A — Align on Pain · 5–20 min',
    title:"How are they showing up?",
    sub:"Choose the discovery path based on whether they named a problem or came to explore.",
    content:()=>'',
    choices:[
      {label:'Direct discovery — they named a problem',hint:"They opened with a pain. Probe depth before routing.",next:'a_direct'},
      {label:'Assisted discovery — came to "see what it does"',hint:"No named pain. You need to surface it first.",next:'a_assisted'}
    ]
  },

  a_direct: {
    stage:2, tag:'tag-a', tagLabel:'A — Direct Discovery',
    title:"Go deep on the pain they named.",
    sub:"Don't stack questions. Ask one, listen, move. Don't move to demo without a locked pain.",
    content:()=>`
      <table class="q-table">
        <tr><th>Probe</th><th>Listen for</th></tr>
        <tr><td>"Where does friction show up most — team, tools, or clients directly?"</td><td>Tool sprawl / ops pain · Client churn · Compliance / insurance</td></tr>
        <tr><td>"How long has this been an issue and what have you tried?"</td><td>Prior tool attempts = real pain · Nothing tried = lower urgency</td></tr>
        <tr><td>"Who does this impact — techs, leadership, or clients directly?"</td><td>Multi-level pain = stronger deal · Client-facing = urgency signal</td></tr>

function toggleAcc(p,i){
  const b=document.getElementById(p+'-'+i);
  const open=b.classList.toggle('visible');
  const btn=b.previousElementSibling;
  if(btn) btn.classList.toggle('open',open);
}
function buildProgressBar(){
  const node=NODES[currentNode];
  const s=node?node.stage:0;
  document.getElementById('progress-bar').innerHTML=STAGES.map((label,i)=>{
    let cls='pill-label';
    if(i===s) cls+=' active';
    else if(i<s) cls+=' done';
    const sep=i<STAGES.length-1?'<div class="pill-sep"></div>':'';
    return `<div class="stage-pill"><span class="${cls}">${label}</span></div>${sep}`;
  }).join('');
}
function navigate(nodeId){
  navHistory.push(currentNode);
  currentNode=nodeId;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){
  if(!navHistory.length) return;
  currentNode=navHistory.pop();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  const node=NODES[currentNode];
  if(!node) return;
  buildProgressBar();
  let choicesHTML='';
  if(node.painChoices){
    choicesHTML=`<div class="pain-grid">${node.painChoices.map(c=>`
      <button class="pain-card" onclick="navigate('${c.next}')">
        <div class="pc-title">${c.title}</div>
        <div class="pc-sub">${c.sub}</div>
      </button>`).join('')}</div>`;
  } else if(node.choices){
    choicesHTML=`<div class="choices">${node.choices.map(c=>`
      <button class="choice-btn" onclick="navigate('${c.next}')">
        <span class="ch-arrow">›</span>
        ${c.hint
          ?`<span class="ch-wrap"><span class="ch-label">${c.label}</span><span class="ch-hint">${c.hint}</span></span>`
          :`<span class="ch-label">${c.label}</span>`}
      </button>`).join('')}</div>`;
  }
  const backBtn=navHistory.length?`<button class="nav-btn" onclick="goBack()">← Back</button>`:'';
  document.getElementById('card').innerHTML=`
    <span class="stage-tag ${node.tag}">${node.tagLabel}</span>
    <h2>${node.title}</h2>
    ${node.sub?`<p class="subtext">${node.sub}</p>`:''}
    ${node.content()}
    ${choicesHTML}
    <div class="nav-row">${backBtn}</div>`;
  if(node.afterRender) node.afterRender();
}
render();
</script>
